<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outras Mídias</title>
  </head>
  <body>
    <header>
      <h1>Outras Midias no HTML5</h1>
    </header>
    <main>
      <h2>Áudio</h2>
      <audio controls src="midias/audio.mp3"></audio>

      <br />

      <video controls src="midias/video.mp4" width="400px" type="Video/mp4">
        Video não encontrado ou não suportado
      </video>

      <h2>Vídeo do Youtube (externo) - iFrame</h2>
      <iframe
        src="https://www.youtube.com/watch?v=RmZuZj3CrT0&pp=ygUIZ2FtZXBsYXk%3D"
        title="Exemplo de vídeo do Youtube"
        width="560px"
        height="315px"
        frameborder="0"
      >
      </iframe>

      <style>
        table,
        th,
        td {
          border: 1px solid black;
        }
      </style>

      <table>
        <caption>Dados da Pessoa</caption>
        <tr>
          <th scope="col">Nome</th>
          <th scope="col">Idade</th>
          <th scope="col">Cidade</th>
        </tr>
        <tr>
          <th scope="row">João</th>
          <td>25</td>
          <td>São Paulo</td>
        </tr>
      </table>
    </main>

    <hr>
    <footer>
        <p><em>&copy; 2026 - FATEC Registro - DSM</em></p>
    </footer>
  </body>
</html>
