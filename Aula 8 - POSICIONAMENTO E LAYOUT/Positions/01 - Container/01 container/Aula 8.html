<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquemas de posicionamento</title>
    <link rel="stylesheet" href="stylr.css">
</head>
<body>
    
    <h2>Positions - Comparação Visual</h2>

    <div class="caixa static texto">Static</div>
    <div class="caixa relative texto">Relative</div>
    
    <!-- Um container agrupa outros elementos dentro de si -->
    <div class="container texto"> 
        Conteiner pai
        <div class="caixa absolute texto">
            Absolute
        </div>
    </div>

    <div class="fixed caixa">FIXED</div>
    <br>
    <p>Role a página para ver o elemento FIXED parado, acompanhando a tela</p>

    <div class="sticky">
        <h4 class="texto">Sticky - Fica grudado no topo</h4>
    </div>

    <div class="espaco"></div>


</body>
</html>
